name: Linting

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ruff
        uses: astral-sh/ruff-action@v1
        with:
          args: "check" # Vérifie les erreurs de logique et de style

      - name: Check formatting with Ruff
        uses: astral-sh/ruff-action@v1
        with:
          args: "format --check" # Vérifie que le code respecte les règles d'espacement
